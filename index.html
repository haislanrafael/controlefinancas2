<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Fluxo de Caixa - Brownie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            800: '#27272a',
                            900: '#18181b'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .btn-primary {
            @apply bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200;
        }
        .btn-success {
            @apply bg-green-600 hover:bg-green-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200;
        }
        .btn-danger {
            @apply bg-red-600 hover:bg-red-700 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200;
        }
        .btn-brownie {
            @apply bg-amber-600 hover:bg-amber-700 text-white font-semibold py-3 px-6 rounded-lg transition-colors duration-200;
        }
        .card {
            @apply bg-zinc-800 rounded-xl p-6 shadow-lg;
        }
        .transaction-item {
            @apply border-b border-zinc-700 py-4 last:border-b-0;
        }
    </style>
</head>
<body class="bg-zinc-900 text-gray-200 min-h-screen">
    <div class="container mx-auto px-4 py-6 max-w-4xl">
        <!-- Header -->
        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">
                <i class="fas fa-coins text-amber-400 mr-2"></i>
                Controle de Fluxo de Caixa
            </h1>
            <p class="text-zinc-400">Gerencie suas finanças de forma simples e eficiente</p>
        </header>

        <!-- Dashboard Financeiro -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Total Entradas -->
            <div class="card text-center">
                <div class="flex items-center justify-center mb-3">
                    <i class="fas fa-arrow-down text-green-400 text-2xl"></i>
                </div>
                <h3 class="text-lg font-semibold text-zinc-300 mb-2">Total Entradas</h3>
                <p id="total-entradas" class="text-2xl font-bold text-green-400">R$ 0,00</p>
            </div>

            <!-- Total Saídas -->
            <div class="card text-center">
                <div class="flex items-center justify-center mb-3">
                    <i class="fas fa-arrow-up text-red-400 text-2xl"></i>
                </div>
                <h3 class="text-lg font-semibold text-zinc-300 mb-2">Total Saídas</h3>
                <p id="total-saidas" class="text-2xl font-bold text-red-400">R$ 0,00</p>
            </div>

            <!-- Saldo Atual -->
            <div class="card text-center">
                <div class="flex items-center justify-center mb-3">
                    <i class="fas fa-wallet text-blue-400 text-2xl"></i>
                </div>
                <h3 class="text-lg font-semibold text-zinc-300 mb-2">Saldo Atual</h3>
                <p id="saldo-atual" class="text-2xl font-bold text-blue-400">R$ 0,00</p>
            </div>
        </div>

        <!-- Lucro Real -->
        <div class="card mb-8">
            <div class="flex items-center justify-between">
                <div>
                    <h3 class="text-lg font-semibold text-zinc-300 mb-1">Lucro Real</h3>
                    <p class="text-zinc-400 text-sm">(Entradas - Custo Fixo de R$ 2,70 por venda)</p>
                </div>
                <p id="lucro-real" class="text-2xl font-bold text-amber-400">R$ 0,00</p>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="flex flex-col sm:flex-row gap-4 mb-8">
            <!-- Brownie Shortcut -->
            <button id="btn-brownie" class="btn-brownie flex-1 flex items-center justify-center">
                <i class="fas fa-cookie-bite mr-2"></i>
                + Novo Brownie (R$ 13,50)
            </button>

            <!-- Nova Transação -->
            <button id="btn-nova-transacao" class="btn-primary flex-1 flex items-center justify-center">
                <i class="fas fa-plus mr-2"></i>
                Nova Transação
            </button>
        </div>

        <!-- Formulário de Transação (Inicialmente Oculto) -->
        <div id="form-container" class="card mb-8 hidden">
            <h3 class="text-xl font-semibold text-white mb-4">Nova Transação</h3>
            
            <form id="transaction-form" class="space-y-4">
                <!-- Descrição -->
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Descrição</label>
                    <input 
                        type="text" 
                        id="descricao" 
                        required
                        class="w-full px-4 py-3 bg-zinc-700 border border-zinc-600 rounded-lg text-white placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="Ex: Venda de brownie, Compra de ingredientes"
                    >
                </div>

                <!-- Tipo -->
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Tipo</label>
                    <select 
                        id="tipo" 
                        required
                        class="w-full px-4 py-3 bg-zinc-700 border border-zinc-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                        <option value="entrada">Entrada</option>
                        <option value="saida">Saída</option>
                    </select>
                </div>

                <!-- Valor -->
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Valor (R$)</label>
                    <input 
                        type="number" 
                        id="valor" 
                        step="0.01" 
                        min="0.01" 
                        required
                        class="w-full px-4 py-3 bg-zinc-700 border border-zinc-600 rounded-lg text-white placeholder-zinc-400 focus:outline-none focus:ring-2 focus:ring-blue-500"
                        placeholder="0,00"
                    >
                </div>

                <!-- Data/Hora -->
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Data e Hora</label>
                    <input 
                        type="datetime-local" 
                        id="datahora" 
                        required
                        class="w-full px-4 py-3 bg-zinc-700 border border-zinc-600 rounded-lg text-white focus:outline-none focus:ring-2 focus:ring-blue-500"
                    >
                </div>

                <!-- Botões -->
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="btn-success flex-1">
                        <i class="fas fa-save mr-2"></i>
                        Salvar
                    </button>
                    <button type="button" id="btn-cancelar" class="btn-danger flex-1">
                        <i class="fas fa-times mr-2"></i>
                        Cancelar
                    </button>
                </div>
            </form>
        </div>

        <!-- Lista de Transações -->
        <div class="card">
            <h3 class="text-xl font-semibold text-white mb-4">Histórico de Transações</h3>
            
            <div id="transactions-list" class="space-y-3">
                <p class="text-zinc-400 text-center py-8" id="empty-state">
                    <i class="fas fa-receipt text-3xl mb-3 text-zinc-600"></i><br>
                    Nenhuma transação registrada
                </p>
            </div>
        </div>
    </div>

    <script>
        // ===== VARIÁVEIS GLOBAIS =====
        let transactions = [];
        const CUSTO_FIXO_BROWNIE = 2.70;
        const PRECO_BROWNIE = 13.50;

        // ===== ELEMENTOS DO DOM =====
        const transactionsList = document.getElementById('transactions-list');
        const emptyState = document.getElementById('empty-state');
        const formContainer = document.getElementById('form-container');
        const transactionForm = document.getElementById('transaction-form');
        const btnNovaTransacao = document.getElementById('btn-nova-transacao');
        const btnCancelar = document.getElementById('btn-cancelar');
        const btnBrownie = document.getElementById('btn-brownie');

        // ===== ELEMENTOS DO DASHBOARD =====
        const totalEntradasEl = document.getElementById('total-entradas');
        const totalSaidasEl = document.getElementById('total-saidas');
        const saldoAtualEl = document.getElementById('saldo-atual');
        const lucroRealEl = document.getElementById('lucro-real');

        // ===== INICIALIZAÇÃO =====
        document.addEventListener('DOMContentLoaded', function() {
            carregarTransacoes();
            atualizarDashboard();
            configurarEventListeners();
        });

        // ===== CONFIGURAÇÃO DE EVENTOS =====
        function configurarEventListeners() {
            btnNovaTransacao.addEventListener('click', mostrarFormulario);
            btnCancelar.addEventListener('click', esconderFormulario);
            btnBrownie.addEventListener('click', adicionarBrownie);
            transactionForm.addEventListener('submit', handleSubmit);

            // Configurar data/hora atual como padrão
            document.getElementById('datahora').value = new Date().toISOString().slice(0, 16);
        }

        // ===== FUNÇÕES PRINCIPAIS =====

        function carregarTransacoes() {
            const stored = localStorage.getItem('cashflow_transactions');
            if (stored) {
                transactions = JSON.parse(stored);
                renderizarTransacoes();
            }
        }

        function salvarTransacoes() {
            localStorage.setItem('cashflow_transactions', JSON.stringify(transactions));
            renderizarTransacoes();
            atualizarDashboard();
        }

        function adicionarTransacao(transacao) {
            transactions.unshift(transacao);
            salvarTransacoes();
            esconderFormulario();
        }

        function removerTransacao(index) {
            if (confirm('Tem certeza que deseja excluir esta transação?')) {
                transactions.splice(index, 1);
                salvarTransacoes();
            }
        }

        function adicionarBrownie() {
            const transacao = {
                id: Date.now(),
                descricao: 'Venda de Brownie',
                tipo: 'entrada',
                valor: PRECO_BROWNIE,
                datahora: new Date().toISOString()
            };
            
            adicionarTransacao(transacao);
            
            // Feedback visual
            btnBrownie.innerHTML = '<i class="fas fa-check mr-2"></i>Brownie Adicionado!';
            btnBrownie.classList.remove('bg-amber-600');
            btnBrownie.classList.add('bg-green-600');
            
            setTimeout(() => {
                btnBrownie.innerHTML = '<i class="fas fa-cookie-bite mr-2"></i>+ Novo Brownie (R$ 13,50)';
                btnBrownie.classList.remove('bg-green-600');
                btnBrownie.classList.add('bg-amber-600');
            }, 2000);
        }

        // ===== CÁLCULOS FINANCEIROS =====

        function calcularTotais() {
            const entradas = transactions
                .filter(t => t.tipo === 'entrada')
                .reduce((sum, t) => sum + t.valor, 0);

            const saidas = transactions
                .filter(t => t.tipo === 'saida')
                .reduce((sum, t) => sum + t.valor, 0);

            const saldo = entradas - saidas;
            
            // Lucro Real: Entradas - (número de vendas * custo fixo)
            const numeroVendas = transactions.filter(t => t.tipo === 'entrada').length;
            const lucroReal = entradas - (numeroVendas * CUSTO_FIXO_BROWNIE);

            return { entradas, saidas, saldo, lucroReal };
        }

        function atualizarDashboard() {
            const { entradas, saidas, saldo, lucroReal } = calcularTotais();

            totalEntradasEl.textContent = formatarMoeda(entradas);
            totalSaidasEl.textContent = formatarMoeda(saidas);
            saldoAtualEl.textContent = formatarMoeda(saldo);
            lucroRealEl.textContent = formatarMoeda(lucroReal);

            // Colorir saldo baseado no valor
            if (saldo > 0) {
                saldoAtualEl.className = 'text-2xl font-bold text-green-400';
            } else if (saldo < 0) {
                saldoAtualEl.className = 'text-2xl font-bold text-red-400';
            } else {
                saldoAtualEl.className = 'text-2xl font-bold text-blue-400';
            }
        }

        // ===== RENDERIZAÇÃO =====

        function renderizarTransacoes() {
            if (transactions.length === 0) {
                emptyState.classList.remove('hidden');
                transactionsList.innerHTML = '';
                transactionsList.appendChild(emptyState);
                return;
            }

            emptyState.classList.add('hidden');
            transactionsList.innerHTML = '';

            transactions.forEach((transacao, index) => {
                const item = criarElementoTransacao(transacao, index);
                transactionsList.appendChild(item);
            });
        }

        function criarElementoTransacao(transacao, index) {
            const div = document.createElement('div');
            div.className = 'transaction-item';
            
            const data = new Date(transacao.datahora);
            const dataFormatada = data.toLocaleDateString('pt-BR');
            const horaFormatada = data.toLocaleTimeString('pt-BR', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });

            div.innerHTML = `
                <div class="flex items-center justify-between">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-1">
                            <span class="w-2 h-2 rounded-full ${transacao.tipo === 'entrada' ? 'bg-green-400' : 'bg-red-400'}"></span>
                            <span class="font-semibold text-white">${transacao.descricao}</span>
                        </div>
                        <div class="text-sm text-zinc-400 ml-5">
                            ${dataFormatada} às ${horaFormatada}
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="font-bold ${transacao.tipo === 'entrada' ? 'text-green-400' : 'text-red-400'}">
                            ${transacao.tipo === 'entrada' ? '+' : '-'} ${formatarMoeda(transacao.valor)}
                        </div>
                        <button onclick="removerTransacao(${index})" class="btn-danger mt-2 text-sm">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;

            return div;
        }

        // ===== MANIPULAÇÃO DO FORMULÁRIO =====

        function mostrarFormulario() {
            formContainer.classList.remove('hidden');
            btnNovaTransacao.classList.add('hidden');
            document.getElementById('descricao').focus();
        }

        function esconderFormulario() {
            formContainer.classList.add('hidden');
            btnNovaTransacao.classList.remove('hidden');
            transactionForm.reset();
            document.getElementById('datahora').value = new Date().toISOString().slice(0, 16);
        }

        function handleSubmit(e) {
            e.preventDefault();

            const transacao = {
                id: Date.now(),
                descricao: document.getElementById('descricao').value.trim(),
                tipo: document.getElementById('tipo').value,
                valor: parseFloat(document.getElementById('valor').value),
                datahora: document.getElementById('datahora').value
            };

            if (transacao.descricao === '' || transacao.valor <= 0) {
                alert('Por favor, preencha todos os campos corretamente.');
                return;
            }

            adicionarTransacao(transacao);
        }

        // ===== UTILITÁRIOS =====

        function formatarMoeda(valor) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(valor);
        }

        // Expor funções para o escopo global (necessário para onclick)
        window.removerTransacao = removerTransacao;
    </script>
</body>
</html>
